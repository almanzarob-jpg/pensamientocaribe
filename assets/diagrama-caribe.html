<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>La antropología del Caribe colombiano</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F5F0E8;font-family:'Jost',sans-serif;color:#1C1A14;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
header{display:flex;align-items:center;justify-content:space-between;padding:11px 24px 10px;border-bottom:1px solid rgba(45,90,27,0.15);flex-shrink:0;background:#F5F0E8;z-index:10}
.brand img{height:32px;width:auto}
.title-block{text-align:center;flex:1;padding:0 16px}
.title-block h1{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#7A2318;letter-spacing:.01em;line-height:1.2}
.title-block p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10.5px;color:#7A6A52;margin-top:2px}
.toolbar{display:flex;gap:5px;flex-shrink:0}
.btn{display:flex;align-items:center;gap:4px;padding:5px 11px;border:1px solid rgba(122,35,24,0.28);border-radius:2px;background:transparent;color:#7A2318;font-family:'Jost',sans-serif;font-size:10px;cursor:pointer;transition:all .18s;letter-spacing:.04em;white-space:nowrap}
.btn:hover{background:rgba(122,35,24,0.07)}
.btn.active{background:rgba(122,35,24,0.12);border-color:rgba(122,35,24,0.55)}

/* ── LAYOUT PRINCIPAL ── */
#workspace{display:flex;flex:1;overflow:hidden}

/* ── CANVAS ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;cursor:grab;background:#F5F0E8}
#canvas-wrap:active{cursor:grabbing}
#main-svg{display:block;width:100%;height:100%}

/* ── PANEL EDITOR ── */
#editor{
  width:320px;flex-shrink:0;
  background:#FDFAF4;
  border-left:1px solid rgba(45,90,27,0.15);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s ease;
}
#editor.hidden{width:0;border-left:none}
#editor-inner{flex:1;overflow-y:auto;padding:16px}
#editor-inner::-webkit-scrollbar{width:4px}
#editor-inner::-webkit-scrollbar-thumb{background:rgba(122,35,24,0.2);border-radius:2px}

.ed-section{margin-bottom:18px}
.ed-section-title{
  font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;
  color:#7A2318;letter-spacing:.06em;text-transform:uppercase;
  padding-bottom:6px;border-bottom:1px solid rgba(122,35,24,0.15);
  margin-bottom:10px;
}
.ed-field{margin-bottom:10px}
.ed-label{font-size:9.5px;color:#7A6A52;letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px}
.ed-input, .ed-textarea{
  width:100%;font-family:'Jost',sans-serif;font-size:11px;
  color:#1C1A14;background:#F5F0E8;
  border:1px solid rgba(45,90,27,0.20);border-radius:2px;
  padding:5px 8px;outline:none;
  transition:border-color .15s;resize:vertical;
}
.ed-input:focus,.ed-textarea:focus{border-color:rgba(122,35,24,0.45)}
.ed-textarea{min-height:54px;line-height:1.4}
.ed-nodo{
  background:rgba(45,90,27,0.04);border:1px solid rgba(45,90,27,0.12);
  border-radius:2px;padding:8px 9px;margin-bottom:7px;
}
.ed-nodo-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ed-nodo-label{font-size:10px;font-weight:500;color:#2D5A1B}
.ed-nodo-del{background:none;border:none;cursor:pointer;color:#9B3D22;font-size:13px;padding:0;opacity:.6}
.ed-nodo-del:hover{opacity:1}
.ed-add{
  width:100%;padding:5px;border:1px dashed rgba(45,90,27,0.30);
  border-radius:2px;background:none;cursor:pointer;
  font-family:'Jost',sans-serif;font-size:10px;color:#2D5A1B;
  opacity:.7;transition:.15s;
}
.ed-add:hover{opacity:1;background:rgba(45,90,27,0.05)}
.ed-sep{height:1px;background:rgba(122,35,24,0.10);margin:14px 0}

/* ── TOOLTIP ── */
#tip{position:absolute;background:#FDFAF4;border:1px solid rgba(122,35,24,0.18);border-left:2.5px solid #9B3D22;border-radius:2px;padding:9px 13px;max-width:220px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:100;box-shadow:0 4px 20px rgba(60,40,20,0.10)}
#tip.on{opacity:1}
#tip h4{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:#7A2318;margin-bottom:3px}
#tip p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10.5px;color:#6B5A45;line-height:1.5}

/* ── ZOOM CONTROLS ── */
.zoom-ctrl{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:3px;z-index:20}
.zbtn{width:25px;height:25px;border:1px solid rgba(122,35,24,0.22);border-radius:2px;background:#F5F0E8;color:#7A2318;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.zbtn:hover{background:rgba(122,35,24,0.07)}
.hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:9px;color:#A89878;pointer-events:none;letter-spacing:.05em}
</style>
</head>

// ══ UTILIDADES TEXTO ═════════════════════════
function wrapLines(text,maxW,pxPerChar=7.2){
  const words=text.replace(/\n/g," ").split(" ");
  const lines=[];let cur="";
  for(const w of words){
    const test=cur?cur+" "+w:w;
    if(test.length*pxPerChar>maxW&&cur){lines.push(cur);cur=w;}
    else cur=test;
  }
  if(cur)lines.push(cur);
  return lines;
}
function renderLines(g,lines,cx,textY,opts){
  const{fontSize=13,fontFamily="'Cormorant Garamond',serif",fontWeight="600",fontStyle="normal",fill="#2D5A1B",opacity=1,lineH=1.28}=opts;
  lines.forEach((line,i)=>{
    g.append("text").attr("x",cx).attr("y",textY+i*fontSize*lineH)
      .attr("text-anchor","middle").attr("dominant-baseline","hanging")
      .attr("font-family",fontFamily).attr("font-size",fontSize)
      .attr("font-weight",fontWeight).attr("font-style",fontStyle)
      .attr("fill",fill).attr("opacity",opacity).text(line);
  });
  return lines.length*fontSize*lineH;
}

// ══ D3 SETUP ═════════════════════════════════
const wrap=document.getElementById("canvas-wrap");
const svg=d3.select("#main-svg");
const g=svg.append("g").attr("id","scene");
const zoom=d3.zoom().scaleExtent([0.12,8]).on("zoom",e=>g.attr("transform",e.transform));
svg.call(zoom);

// ══ TOOLTIP ══════════════════════════════════
const tip=document.getElementById("tip"),th=document.getElementById("th"),tp=document.getElementById("tp");
function showTip(ev,label,desc){if(!desc)return;th.textContent=label;tp.textContent=desc;tip.classList.add("on");moveTip(ev);}
function moveTip(ev){const r=wrap.getBoundingClientRect();let x=ev.clientX-r.left+14,y=ev.clientY-r.top-10;if(x+235>r.width)x-=250;if(y+90>r.height)y-=80;tip.style.left=x+"px";tip.style.top=y+"px";}
function hideTip(){tip.classList.remove("on");}

// ══ RENDER ═══════════════════════════════════
function render(){
  g.selectAll("*").remove();
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const sx=v=>v*W,sy=v=>v*H;
  const defs=g.append("defs");

  function shadow(id,col,blur=3,op=0.20){
    const f=defs.append("filter").attr("id",id).attr("x","-25%").attr("y","-25%").attr("width","150%").attr("height","150%");
    f.append("feDropShadow").attr("dx",0).attr("dy",1).attr("stdDeviation",blur).attr("flood-color",col).attr("flood-opacity",op);
  }
  shadow("sh-v",C.verde,4,0.20);shadow("sh-r",C.rojo,4,0.20);
  shadow("sh-n",C.naranja,3,0.25);shadow("sh-d",C.dorado,3,0.22);

  // posMap
  const pos={};
  STATE.campos.forEach(c=>c.nodos.forEach(n=>{pos[n.label.substring(0,4).toLowerCase()]={x:sx(n.x),y:sy(n.y)};}));
  STATE.red.forEach(n=>{pos[n.id]={x:sx(n.x),y:sy(n.y)};});

  // Aristas externas
  STATE.extAristas.forEach(a=>{
    const s=pos[a.src];
    const nExt=STATE.campos[a.campo]?.nodos.find(n=>n.label.includes(a.nodoParcial));
    if(!s||!nExt)return;
    g.append("line").attr("x1",s.x).attr("y1",s.y).attr("x2",sx(nExt.x)).attr("y2",sy(nExt.y))
      .attr("stroke",C.cian).attr("stroke-width",1).attr("stroke-opacity",0.42).attr("stroke-dasharray","5,4");
  });

  // Aristas red interna
  STATE.redAristas.forEach(([a,b])=>{
    const s=pos[a],t=pos[b];if(!s||!t)return;
    g.append("line").attr("x1",s.x).attr("y1",s.y).attr("x2",t.x).attr("y2",t.y)
      .attr("stroke",C.dorado).attr("stroke-width",1).attr("stroke-opacity",0.35);
  });

  // Campos
  STATE.campos.forEach((c,ci)=>{
    const cx=sx(c.cx),cy=sy(c.cy),rx=sx(c.rx),ry=sy(c.ry);
    const sh=ci===0?"sh-v":"sh-r";
    g.append("ellipse").attr("cx",cx).attr("cy",cy).attr("rx",rx).attr("ry",ry)
      .attr("fill",c.col).attr("fill-opacity",0.07).attr("stroke","none");
    g.append("ellipse").attr("cx",cx).attr("cy",cy).attr("rx",rx).attr("ry",ry)
      .attr("fill","none").attr("stroke",c.col).attr("stroke-width",1.8).attr("stroke-opacity",0.75)
      .attr("filter",`url(#${sh})`);

    // Texto del campo — dentro de la elipse
    const maxW=rx*1.05;
    const lcx=sx(c.labelCx),lcy=sy(c.labelCy);
    const mainLines=wrapLines(c.label,maxW,7.2);
    const mainH=renderLines(g,mainLines,lcx,lcy,{fontSize:13.5,fill:c.col,opacity:1});
    const subLines=c.sub.split("\n");
    renderLines(g,subLines,lcx,lcy+mainH+3,{fontSize:9,fontStyle:"italic",fontWeight:"400",fill:c.col,opacity:0.60});

    // Nodos
    c.nodos.forEach(n=>{
      const nx=sx(n.x),ny=sy(n.y);
      const ng=g.append("g").style("cursor",n.desc?"pointer":"default");
      ng.append("circle").attr("cx",nx).attr("cy",ny).attr("r",4.5).attr("fill",C.fondo)
        .attr("stroke",c.col).attr("stroke-width",1.5).attr("filter",`url(#${sh})`);
      ng.append("circle").attr("cx",nx).attr("cy",ny).attr("r",1.6).attr("fill",c.col).attr("opacity",0.85);
      ng.append("text").attr("x",nx+8).attr("y",ny).attr("dominant-baseline","middle")
        .attr("font-family","'Jost',sans-serif").attr("font-size",11).attr("fill",C.texto).attr("opacity",0.88)
        .text(n.label);
      if(n.desc) ng.on("mouseenter",e=>showTip(e,n.label,n.desc)).on("mousemove",moveTip).on("mouseleave",hideTip);
    });
  });

  // Intersección
  const{cx:icx,cy:icy,rx:irx,ry:iry}=STATE.inter;
  const ix=sx(icx),iy=sy(icy),iRx=sx(irx),iRy=sy(iry);
  g.append("ellipse").attr("cx",ix).attr("cy",iy).attr("rx",iRx).attr("ry",iRy)
    .attr("fill",STATE.inter.col).attr("fill-opacity",0.09).attr("stroke","none");
  g.append("ellipse").attr("cx",ix).attr("cy",iy).attr("rx",iRx).attr("ry",iRy)
    .attr("fill","none").attr("stroke",STATE.inter.col).attr("stroke-width",2)
    .attr("stroke-opacity",0.80).attr("filter","url(#sh-n)");

  const imaxW=iRx*1.75;
  const iLines=wrapLines(STATE.inter.label,imaxW,6.8);
  const iH=iLines.length*13*1.28;
  const iStartY=iy-iH/2-8;
  const iUsed=renderLines(g,iLines,ix,iStartY,{fontSize:12,fontWeight:"700",fill:STATE.inter.col});
  const isLines=STATE.inter.sub.split("\n");
  renderLines(g,isLines,ix,iStartY+iUsed+4,{fontSize:9,fontStyle:"italic",fontWeight:"400",fill:STATE.inter.col,opacity:0.68});

  // Red interna
  STATE.red.forEach(n=>{
    const nx=sx(n.x),ny=sy(n.y);
    const ng=g.append("g").style("cursor","pointer");
    ng.append("circle").attr("cx",nx).attr("cy",ny).attr("r",5)
      .attr("fill",C.dorado).attr("fill-opacity",0.88)
      .attr("stroke",C.fondo).attr("stroke-width",1.2).attr("filter","url(#sh-d)");
    const lx=nx>ix?nx+8:nx-8, anchor=nx>ix?"start":"end";
    ng.append("text").attr("x",lx).attr("y",ny).attr("dominant-baseline","middle")
      .attr("text-anchor",anchor).attr("font-family","'Jost',sans-serif")
      .attr("font-size",10.5).attr("fill",C.dorado).attr("opacity",0.92).text(n.label);
    ng.on("mouseenter",e=>showTip(e,n.label,n.desc)).on("mousemove",moveTip).on("mouseleave",hideTip);
  });
}

// ══ PANEL EDITOR ═════════════════════════════
let editorOpen=false;

function buildEditor(){
  const inner=document.getElementById("editor-inner");
  inner.innerHTML="";

  // ── Título del esquema
  sec("Título del esquema", s=>{
    field(s,"Título",STATE.campos[0].label.split(" ")[0]+"…","input",null,null,"— editar en el header directamente");
    // Solo indicación — el h1 ya es contenteditable
    const note=document.createElement("p");
    note.style.cssText="font-size:9.5px;color:#7A6A52;font-style:italic;line-height:1.4";
    note.textContent="El título y subtítulo del header son editables directamente: haz clic sobre ellos.";
    s.appendChild(note);
  });

  div(inner);

  // ── Campos
  STATE.campos.forEach((c,ci)=>{
    sec(`Campo ${ci+1}`, s=>{
      field(s,"Etiqueta","",    "input",   v=>{c.label=v;render();}, c.label);
      field(s,"Subtítulo","",  "textarea", v=>{c.sub=v;render();},   c.sub);

      const nodosTitle=document.createElement("div");
      nodosTitle.className="ed-label";nodosTitle.style.marginTop="8px";
      nodosTitle.textContent="NODOS";s.appendChild(nodosTitle);

      const nodosWrap=document.createElement("div");nodosWrap.id=`nodos-${ci}`;s.appendChild(nodosWrap);

      function rebuildNodos(){
        nodosWrap.innerHTML="";
        c.nodos.forEach((n,ni)=>{
          const box=document.createElement("div");box.className="ed-nodo";
          const hdr=document.createElement("div");hdr.className="ed-nodo-header";
          const lbl=document.createElement("span");lbl.className="ed-nodo-label";lbl.textContent=n.label||"Nodo "+(ni+1);
          const del=document.createElement("button");del.className="ed-nodo-del";del.textContent="×";
          del.onclick=()=>{c.nodos.splice(ni,1);render();rebuildNodos();};
          hdr.appendChild(lbl);hdr.appendChild(del);box.appendChild(hdr);
          // label
          const inp=textarea(n.label,v=>{n.label=v;lbl.textContent=v;render();});
          inp.style.marginBottom="5px";box.appendChild(inp);
          // desc
          const dLabel=document.createElement("div");dLabel.className="ed-label";dLabel.textContent="DESCRIPCIÓN (hover)";
          box.appendChild(dLabel);
          box.appendChild(textarea(n.desc,v=>{n.desc=v;render();}));
          nodosWrap.appendChild(box);
        });
        // botón añadir nodo
        const addBtn=document.createElement("button");addBtn.className="ed-add";
        addBtn.textContent="+ añadir nodo";
        addBtn.onclick=()=>{
          c.nodos.push({label:"Nuevo nodo",x:c.cx,y:c.cy,desc:""});
          render();rebuildNodos();
        };
        nodosWrap.appendChild(addBtn);
      }
      rebuildNodos();
    });
    div(inner);
  });

  // ── Intersección
  sec("Zona de intersección", s=>{
    field(s,"Etiqueta","",   "textarea", v=>{STATE.inter.label=v;render();}, STATE.inter.label);
    field(s,"Subtítulo","",  "textarea", v=>{STATE.inter.sub=v;render();},   STATE.inter.sub);
  });

  div(inner);

  // ── Red interna
  sec("Red interna", s=>{
    const nodosWrap=document.createElement("div");s.appendChild(nodosWrap);
    function rebuildRed(){
      nodosWrap.innerHTML="";
      STATE.red.forEach((n,ni)=>{
        const box=document.createElement("div");box.className="ed-nodo";
        box.style.borderColor="rgba(138,100,24,0.25)";
        const hdr=document.createElement("div");hdr.className="ed-nodo-header";
        const lbl=document.createElement("span");lbl.className="ed-nodo-label";
        lbl.style.color=C.dorado;lbl.textContent=n.label;
        const del=document.createElement("button");del.className="ed-nodo-del";del.textContent="×";
        del.onclick=()=>{STATE.red.splice(ni,1);render();rebuildRed();};
        hdr.appendChild(lbl);hdr.appendChild(del);box.appendChild(hdr);
        const inp=textarea(n.label,v=>{n.label=v;lbl.textContent=v;render();});
        inp.style.marginBottom="5px";box.appendChild(inp);
        const dLabel=document.createElement("div");dLabel.className="ed-label";dLabel.textContent="DESCRIPCIÓN";
        box.appendChild(dLabel);
        box.appendChild(textarea(n.desc,v=>{n.desc=v;render();}));
        nodosWrap.appendChild(box);
      });
      const addBtn=document.createElement("button");addBtn.className="ed-add";
      addBtn.style.borderColor="rgba(138,100,24,0.30)";addBtn.style.color=C.dorado;
      addBtn.textContent="+ añadir nodo";
      addBtn.onclick=()=>{
        const id="n"+Date.now();
        STATE.red.push({id,label:"Nuevo",x:0.49,y:0.50,desc:""});
        render();rebuildRed();
      };
      nodosWrap.appendChild(addBtn);
    }
    rebuildRed();
  });

  // ── helpers
  function sec(title,cb){
    const s=document.createElement("div");s.className="ed-section";
    const t=document.createElement("div");t.className="ed-section-title";t.textContent=title;
    s.appendChild(t);cb(s);inner.appendChild(s);
  }
  function div(parent){
    const d=document.createElement("div");d.className="ed-sep";parent.appendChild(d);
  }
  function field(parent,label,placeholder,type,onChange,value,note){
    const wrap=document.createElement("div");wrap.className="ed-field";
    const l=document.createElement("div");l.className="ed-label";l.textContent=label;
    wrap.appendChild(l);
    if(note){const p=document.createElement("p");p.style.cssText="font-size:9px;color:#A89878;font-style:italic";p.textContent=note;wrap.appendChild(p);parent.appendChild(wrap);return;}
    const el=type==="textarea"?document.createElement("textarea"):document.createElement("input");
    el.className=type==="textarea"?"ed-textarea":"ed-input";
    if(placeholder)el.placeholder=placeholder;
    if(value!==undefined)el.value=value;
    if(onChange)el.addEventListener("input",e=>onChange(e.target.value));
    wrap.appendChild(el);parent.appendChild(wrap);
  }
  function textarea(value,onChange){
    const el=document.createElement("textarea");el.className="ed-textarea";
    el.style.minHeight="36px";el.value=value||"";
    el.addEventListener("input",e=>onChange(e.target.value));
    return el;
  }
}

function toggleEditor(){
  editorOpen=!editorOpen;
  const panel=document.getElementById("editor");
  panel.classList.toggle("hidden",!editorOpen);
  document.getElementById("btn-edit").classList.toggle("active",editorOpen);
  if(editorOpen) buildEditor();
  setTimeout(render,260); // re-render tras animación
}

document.getElementById("btn-edit").addEventListener("click",toggleEditor);

document.getElementById("zi").addEventListener("click",()=>svg.transition().duration(220).call(zoom.scaleBy,1.4));

// ══ EXPORT ═══════════════════════════════════
function exportSVG(){
  const el=document.getElementById("main-svg"),W=wrap.clientWidth,H=wrap.clientHeight;
  const clone=el.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  clone.setAttribute("width",W);clone.setAttribute("height",H);
  const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("width","100%");bg.setAttribute("height","100%");bg.setAttribute("fill","#F5F0E8");
  clone.insertBefore(bg,clone.firstChild);
  clone.querySelector("#scene").setAttribute("transform",g.attr("transform")||"");
  const blob=new Blob([clone.outerHTML],{type:"image/svg+xml"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download="esquema-caribe.svg";a.click();
  URL.revokeObjectURL(url);
}
async function exportPNG(){
  const el=document.getElementById("main-svg"),W=wrap.clientWidth,H=wrap.clientHeight,sc=2;
  const clone=el.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  clone.setAttribute("width",W*sc);clone.setAttribute("height",H*sc);
  clone.setAttribute("viewBox",`0 0 ${W} ${H}`);
  const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("width","100%");bg.setAttribute("height","100%");bg.setAttribute("fill","#F5F0E8");
  clone.insertBefore(bg,clone.firstChild);
  clone.querySelector("#scene").setAttribute("transform",g.attr("transform")||"");
  const url=URL.createObjectURL(new Blob([new XMLSerializer().serializeToString(clone)],{type:"image/svg+xml;charset=utf-8"}));
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    canvas.width=W*sc;canvas.height=H*sc;
    const ctx=canvas.getContext("2d");
    ctx.fillStyle="#F5F0E8";ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img,0,0);URL.revokeObjectURL(url);
    canvas.toBlob(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="esquema-caribe.png";a.click();},"image/png");
  };
  img.onerror=()=>{alert("Error PNG — usa SVG.");URL.revokeObjectURL(url);};
  img.src=url;
}
document.getElementById("btn-svg").addEventListener("click",exportSVG);
document.getElementById("btn-png").addEventListener("click",exportPNG);

// ══ INIT ═════════════════════════════════════
render();
window.addEventListener("resize",render);
</script>
